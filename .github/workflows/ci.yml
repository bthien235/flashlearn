name: Fullstack CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "frontend/**"
      - "pom.xml"
      - "mvnw"
      - ".mvn/**"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "frontend/**"
      - "pom.xml"
      - "mvnw"
      - ".mvn/**"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/flashlearn-backend

jobs:
  detect-project:
    name: Detect Project Parts
    runs-on: ubuntu-latest
    outputs:
      has_frontend: ${{ steps.detect.outputs.has_frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect frontend
        id: detect
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    needs: detect-project

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: flashlearn_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and test
        env:
          DB_URL: jdbc:mysql://localhost:3306/flashlearn_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          DB_USERNAME: root
          DB_PASSWORD: testpassword
          JWT_SECRET: ci-test-secret-key-not-for-production-use-only
          FLYWAY_ENABLED: false
        run: ./mvnw -B clean test

      - name: Package artifact
        run: ./mvnw -B package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashlearn-backend-jar
          path: target/*.jar
          retention-days: 7

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    needs: detect-project
    if: needs.detect-project.outputs.has_frontend == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present -- --watch=false

      - name: Build
        run: npm run build

  docker:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    needs: [detect-project, backend-test, frontend-check]
    if: |
      always() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
      ) &&
      needs.backend-test.result == 'success' &&
      (
        needs.detect-project.outputs.has_frontend != 'true' ||
        needs.frontend-check.result == 'success'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: ${{ always() && needs.docker.result == 'success' }}
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_IMAGE: ${{ env.IMAGE_NAME }}:latest
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DOCKER_IMAGE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,VPS_APP_DIR
          script_stop: true
          script: |
            set -e
            APP_DIR="${VPS_APP_DIR:-/opt/flashlearn}"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
              echo "Docker Hub credentials are missing."
              exit 1
            fi

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            if [ ! -f docker-compose.prod.yml ]; then
              echo "docker-compose.prod.yml not found in $APP_DIR"
              exit 1
            fi

            if [ ! -f .env ]; then
              touch .env
            fi

            # Normalize environment file to avoid parse errors from accidental spaces/CRLF/@ lines.
            sed -i 's/\r$//' .env
            sed -i 's/^[[:space:]]*//' .env
            sed -i '/^[[:space:]]*@[[:space:]]*$/d' .env

            APP_IMAGE="$DOCKER_IMAGE" docker compose -f docker-compose.prod.yml --env-file .env config >/dev/null
            APP_IMAGE="$DOCKER_IMAGE" docker compose -f docker-compose.prod.yml --env-file .env pull app
            APP_IMAGE="$DOCKER_IMAGE" docker compose -f docker-compose.prod.yml --env-file .env up -d
            docker image prune -f
