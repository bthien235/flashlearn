<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Decks - FlashLearn</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4F46E5;
      --primary-dark: #4338CA;
      --success: #10B981;
      --danger: #EF4444;
      --bg: #F3F4F6;
      --text: #1F2937;
      --gray: #6B7280;
      --white: #ffffff;
      --radius: 14px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 8px 25px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Header */
    header {
      background: var(--white);
      box-shadow: var(--shadow-sm);
      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-links a {
      font-weight: 500;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--primary); }

    .btn-create {
      background: var(--primary);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: background 0.3s;
    }

    .btn-create:hover { background: var(--primary-dark); }

    /* Page */
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 2.5rem 1.5rem;
    }

    .page-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-desc {
      color: var(--gray);
      margin-bottom: 2rem;
    }

    /* Section */
    .section {
      margin-bottom: 3rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
    }

    .section-header h2 {
      font-size: 1.3rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    /* Grid */
    .deck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem;
    }

    .deck-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      transition: 0.25s;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #E5E7EB;
    }

    .deck-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-md);
    }

    .deck-cover {
      height: 120px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .deck-cover.orange { background: linear-gradient(135deg, #F59E0B, #D97706); }
    .deck-cover.green { background: linear-gradient(135deg, #10B981, #059669); }

    .deck-body {
      padding: 1.3rem;
      flex-grow: 1;
    }

    .deck-title {
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .deck-meta {
      font-size: 0.85rem;
      color: var(--gray);
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.8rem;
    }

    .progress-bar {
      height: 6px;
      background: #E5E7EB;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress {
      height: 100%;
      background: var(--success);
    }

    .deck-actions {
      display: flex;
      gap: 0.5rem;
    }

    .action-btn {
      flex: 1;
      padding: 0.5rem;
      font-size: 0.85rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    .action-btn:hover { opacity: 0.85; }

    .learn { background: var(--primary); color: white; }
    .edit { background: #E5E7EB; }
    .delete { background: #FEE2E2; color: var(--danger); }

    /* Empty */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--gray);
      border: 2px dashed #E5E7EB;
      border-radius: var(--radius);
    }

    .empty i { font-size: 3rem; margin-bottom: 1rem; color: #D1D5DB; display: block; }

    .empty .btn-create-empty {
      margin-top: 1rem;
      display: inline-block;
      padding: 0.6rem 1.5rem;
      background: var(--primary);
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .modal h3 { margin-bottom: 0.5rem; }
    .modal p { color: var(--gray); font-size: 0.9rem; margin-bottom: 1.5rem; }

    .modal-actions {
      display: flex;
      gap: 0.8rem;
    }

    .modal-actions button {
      flex: 1;
      padding: 0.7rem;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .modal-cancel { background: #E5E7EB; }
    .modal-confirm { background: var(--danger); color: white; }

    @media (max-width: 768px) {
      .page-title { font-size: 1.5rem; }
      .nav-links { display: none; }
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <a th:href="@{/}" href="/" class="logo"><i class="fa-solid fa-layer-group"></i> FlashLearn</a>
    <div class="nav-links">
      <a th:href="@{/library}" href="/library">Thu vien</a>
      <a th:href="@{/mydeck}" href="/mydeck" class="active">Cua toi</a>
      <a th:href="@{/leaderboard}" href="/leaderboard">Xep hang</a>
      <a th:href="@{/profile}" href="/profile">Ho so</a>
    </div>
    <a th:href="@{/adddeck}" href="/adddeck" class="btn-create"><i class="fa-solid fa-plus"></i> Tao bo the</a>
  </div>
</header>

<div class="container">
  <h1 class="page-title">My Decks</h1>
  <p class="page-desc">Quan ly cac bo the ban da tao hoac luu ve</p>

  <!-- CREATED -->
  <section class="section">
    <div class="section-header">
      <h2><i class="fa-solid fa-pen"></i> Bo the da tao</h2>
    </div>

    <div class="deck-grid" id="createdDecks"></div>
  </section>

  <!-- SAVED -->
  <section class="section">
    <div class="section-header">
      <h2><i class="fa-solid fa-bookmark"></i> Bo the da luu</h2>
    </div>

    <div class="deck-grid" id="savedDecks"></div>
  </section>

</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3><i class="fa-solid fa-triangle-exclamation" style="color: #EF4444;"></i> Xac nhan xoa</h3>
    <p>Ban co chac muon xoa bo the nay? Hanh dong nay khong the hoan tac.</p>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="hideDeleteModal()">Huy</button>
      <button class="modal-confirm" onclick="confirmDelete()">Xoa</button>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
const API_BASE = '/api';
let deleteDeckId = null;

function getToken() {
    return localStorage.getItem('token');
}

function showDeleteModal(id) {
    deleteDeckId = id;
    document.getElementById('deleteModal').classList.add('show');
}

function hideDeleteModal() {
    document.getElementById('deleteModal').classList.remove('show');
    deleteDeckId = null;
}

async function confirmDelete() {
    if (!deleteDeckId) return;
    try {
        const res = await fetch(API_BASE + '/decks/' + deleteDeckId, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        if (!res.ok) {
            throw new Error('delete-failed');
        }
        hideDeleteModal();
        await loadMyDecks();
    } catch (e) {
        alert('Khong the xoa bo the!');
        hideDeleteModal();
    }
}

function toCoverClass(category) {
    const cat = (category || '').toUpperCase();
    if (cat.includes('TOEIC')) return 'orange';
    if (cat.includes('DAILY')) return 'green';
    return '';
}

function toCoverIcon(category) {
    const cat = (category || '').toUpperCase();
    if (cat.includes('TOEIC')) return 'fa-briefcase';
    if (cat.includes('DAILY')) return 'fa-comments';
    return 'fa-code';
}

function renderDeckCard(deck, saved) {
    const progress = Math.max(0, Math.min(100, Number(deck.progress || 0)));
    const cardCount = Number(deck.cardCount || 0);
    const coverClass = toCoverClass(deck.category);
    const coverIcon = toCoverIcon(deck.category);

    return `
      <div class="deck-card">
        <div class="deck-cover ${coverClass}"><i class="fa-solid ${coverIcon}"></i></div>
        <div class="deck-body">
          <div class="deck-title">${deck.name || 'Untitled deck'}</div>
          <div class="deck-meta">
            <span>${cardCount} the</span>
            <span>${progress}% hoan thanh</span>
          </div>
          <div class="progress-bar">
            <div class="progress" style="width:${progress}%"></div>
          </div>
          <div class="deck-actions">
            <button class="action-btn learn" onclick="window.location.href='/study?deckId=${deck.id}'">Hoc</button>
            ${saved ? '' : `<button class="action-btn edit" onclick="window.location.href='/addflashcard?deckId=${deck.id}'">Sua</button>`}
            <button class="action-btn delete" onclick="${saved ? `unsaveDeck(${deck.id})` : `showDeleteModal(${deck.id})`}">${saved ? 'Bo luu' : 'Xoa'}</button>
          </div>
        </div>
      </div>
    `;
}

function renderEmpty(containerId, icon, text) {
    document.getElementById(containerId).innerHTML = `
      <div class="empty">
        <i class="fa-solid ${icon}"></i>
        <p>${text}</p>
      </div>
    `;
}

async function loadMyDecks() {
    try {
        const res = await fetch(API_BASE + '/decks', {
            headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        if (!res.ok) {
            return;
        }

        const decks = await res.json();
        if (!Array.isArray(decks)) {
            return;
        }

        const created = decks.filter(d => !d.saved);
        const saved = decks.filter(d => d.saved);

        if (created.length > 0) {
            document.getElementById('createdDecks').innerHTML = created.map(deck => renderDeckCard(deck, false)).join('');
        } else {
            renderEmpty('createdDecks', 'fa-box-open', 'Ban chua tao bo the nao.');
        }

        if (saved.length > 0) {
            document.getElementById('savedDecks').innerHTML = saved.map(deck => renderDeckCard(deck, true)).join('');
        } else {
            renderEmpty('savedDecks', 'fa-bookmark', 'Ban chua luu bo the nao.');
        }
    } catch (e) {
        // Keep fallback static HTML if API fails.
    }
}

async function unsaveDeck(deckId) {
    try {
        const res = await fetch(API_BASE + '/library/decks/' + deckId + '/save', {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        if (!res.ok) {
            throw new Error('unsave-failed');
        }
        await loadMyDecks();
    } catch (e) {
        alert('Khong the bo luu bo the!');
    }
}

// Check auth
if (!getToken()) {
    window.location.href = '/login';
}

loadMyDecks();
</script>

</body>
</html>
