spring.application.name=flashlearn
spring.config.import=optional:file:.env[.properties]

# Server config
server.port=${SERVER_PORT:8080}


# MySQL configuration
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:flashlearn-super-secret-key-change-this-in-production-2026}
app.jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}

# Flyway database migration
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
