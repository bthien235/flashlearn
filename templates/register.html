<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang ky - FlashLearn</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --bg: #F3F4F6;
            --text: #1F2937;
            --gray: #6B7280;
            --white: #ffffff;
            --radius: 16px;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container {
            width: 100%;
            max-width: 460px;
            padding: 1.5rem;
        }
        .register-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem;
        }
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .register-header .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }
        .register-header p {
            color: var(--gray);
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.1rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 0.4rem;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 0.95rem;
        }
        .input-wrapper input {
            width: 100%;
            padding: 0.8rem 0.8rem 0.8rem 2.8rem;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.3s;
            outline: none;
        }
        .input-wrapper input:focus {
            border-color: var(--primary);
        }
        .input-wrapper input.error {
            border-color: #EF4444;
        }
        .field-error {
            color: #EF4444;
            font-size: 0.8rem;
            margin-top: 4px;
            display: none;
        }
        .field-error.show { display: block; }
        .btn-register {
            width: 100%;
            padding: 0.85rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            font-family: inherit;
            margin-top: 0.5rem;
        }
        .btn-register:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .error-message {
            background: #FEF2F2;
            color: #DC2626;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .error-message.show { display: flex; }
        .success-message {
            background: #F0FDF4;
            color: #16A34A;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .success-message.show { display: flex; }
        .login-link {
            text-align: center;
            font-size: 0.9rem;
            color: var(--gray);
            margin-top: 1.5rem;
        }
        .login-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .login-link a:hover { text-decoration: underline; }

        /* Social register */
        .social-register {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .social-btn {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text);
        }
        .social-btn.google:hover { border-color: #EA4335; background: #FEF2F2; }
        .social-btn.github:hover { border-color: #333; background: #F6F8FA; }

        .divider {
            display: flex;
            align-items: center;
            margin: 0 0 1.5rem;
            color: var(--gray);
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E5E7EB;
        }
        .divider span { padding: 0 1rem; }

        /* Terms checkbox */
        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-top: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .terms-group input[type="checkbox"] {
            margin-top: 3px;
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        .terms-group label {
            font-size: 0.82rem;
            color: var(--gray);
            line-height: 1.4;
            cursor: pointer;
            font-weight: 400 !important;
        }
        .terms-group label a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .terms-group label a:hover { text-decoration: underline; }
        .terms-error {
            color: #EF4444;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            display: none;
        }
        .terms-error.show { display: block; }

        .password-strength {
            height: 4px;
            background: #E5E7EB;
            border-radius: 4px;
            margin-top: 6px;
            overflow: hidden;
        }
        .password-strength .bar {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s, background 0.3s;
        }
        .strength-text {
            font-size: 0.75rem;
            margin-top: 3px;
            color: var(--gray);
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <div class="logo">
                <i class="fa-solid fa-layer-group"></i> FlashLearn
            </div>
            <p>Tao tai khoan de bat dau hoc tap</p>
        </div>

        <div class="error-message" id="errorMsg">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorText"></span>
        </div>

        <div class="success-message" id="successMsg">
            <i class="fa-solid fa-circle-check"></i>
            <span id="successText"></span>
        </div>

        <!-- Social Register - ngang: Google | GitHub -->
        <div class="social-register">
            <button class="social-btn google" onclick="registerGoogle()">
                <i class="fa-brands fa-google" style="color: #EA4335; font-size: 1.1rem;"></i> Google
            </button>
            <button class="social-btn github" onclick="registerGithub()">
                <i class="fa-brands fa-github" style="color: #333; font-size: 1.1rem;"></i> GitHub
            </button>
        </div>

        <div class="divider"><span>hoac dang ky bang email</span></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Ho va ten</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="fullname" placeholder="Nhap ho va ten" required>
                </div>
            </div>

            <div class="form-group">
                <label>Ten dang nhap</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-at"></i>
                    <input type="text" id="username" placeholder="Nhap ten dang nhap" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Nhap email cua ban" required>
                </div>
            </div>

            <div class="form-group">
                <label>Mat khau</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Toi thieu 6 ky tu" required oninput="checkStrength()">
                </div>
                <div class="password-strength">
                    <div class="bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>

            <div class="form-group">
                <label>Xac nhan mat khau</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-shield-halved"></i>
                    <input type="password" id="confirmPassword" placeholder="Nhap lai mat khau" required>
                </div>
                <div class="field-error" id="confirmError">Mat khau khong khop!</div>
            </div>

            <div class="terms-group">
                <input type="checkbox" id="agreeTerms">
                <label for="agreeTerms">Toi dong y voi <a href="#">Dieu khoan su dung</a> va <a href="#">Chinh sach bao mat</a> cua FlashLearn</label>
            </div>
            <div class="terms-error" id="termsError">Vui long dong y voi dieu khoan su dung!</div>

            <button type="submit" class="btn-register">
                <i class="fa-solid fa-user-plus"></i> Dang ky
            </button>
        </form>

        <div class="login-link">
            Da co tai khoan? <a th:href="@{/login}" href="/login">Dang nhap</a>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
<script>
const API_BASE = '/api';

function registerGoogle() {
    alert('Chuc nang dang ky bang Google dang duoc phat trien!');
}

function registerGithub() {
    alert('Chuc nang dang ky bang GitHub dang duoc phat trien!');
}

function checkStrength() {
    const pwd = document.getElementById('password').value;
    const bar = document.getElementById('strengthBar');
    const text = document.getElementById('strengthText');
    let strength = 0;
    if (pwd.length >= 6) strength++;
    if (pwd.length >= 10) strength++;
    if (/[A-Z]/.test(pwd)) strength++;
    if (/[0-9]/.test(pwd)) strength++;
    if (/[^A-Za-z0-9]/.test(pwd)) strength++;

    const levels = [
        { width: '0%', color: '#E5E7EB', label: '' },
        { width: '20%', color: '#EF4444', label: 'Rat yeu' },
        { width: '40%', color: '#F59E0B', label: 'Yeu' },
        { width: '60%', color: '#F59E0B', label: 'Trung binh' },
        { width: '80%', color: '#10B981', label: 'Manh' },
        { width: '100%', color: '#10B981', label: 'Rat manh' }
    ];

    bar.style.width = levels[strength].width;
    bar.style.background = levels[strength].color;
    text.textContent = levels[strength].label;
    text.style.color = levels[strength].color;
}

async function handleRegister(e) {
    e.preventDefault();
    const fullname = document.getElementById('fullname').value;
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const successMsg = document.getElementById('successMsg');
    const successText = document.getElementById('successText');
    const confirmError = document.getElementById('confirmError');

    errorMsg.classList.remove('show');
    successMsg.classList.remove('show');
    confirmError.classList.remove('show');
    document.getElementById('termsError').classList.remove('show');

    if (password !== confirmPassword) {
        confirmError.classList.add('show');
        document.getElementById('confirmPassword').classList.add('error');
        return;
    }

    if (password.length < 6) {
        errorText.textContent = 'Mat khau phai co it nhat 6 ky tu!';
        errorMsg.classList.add('show');
        return;
    }

    if (!document.getElementById('agreeTerms').checked) {
        document.getElementById('termsError').classList.add('show');
        return;
    }

    try {
        const res = await fetch(API_BASE + '/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fullname, username, email, password })
        });

        if (res.ok) {
            successText.textContent = 'Dang ky thanh cong! Dang chuyen huong...';
            successMsg.classList.add('show');
            setTimeout(() => {
                window.location.href = '/login';
            }, 1500);
        } else {
            const err = await res.json().catch(() => ({}));
            errorText.textContent = err.message || 'Dang ky that bai! Vui long thu lai.';
            errorMsg.classList.add('show');
        }
    } catch (error) {
        errorText.textContent = 'Khong the ket noi den server!';
        errorMsg.classList.add('show');
    }
}
</script>

</body>
</html>
