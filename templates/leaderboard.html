<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bang xep hang - FlashLearn</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#4F46E5; --bg:#F3F4F6; --text:#1F2937; --gray:#6B7280; --white:#fff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); }
    header { background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.05); padding:1rem 1.5rem; position:sticky; top:0; z-index:100; }
    .header-inner { max-width:1100px; margin:auto; display:flex; justify-content:space-between; align-items:center; }
    .logo { font-size:1.5rem; font-weight:800; color:var(--primary); text-decoration:none; display:flex; align-items:center; gap:8px; }
    .nav-links { display:flex; gap:2rem; }
    .nav-links a { color:var(--gray); text-decoration:none; font-weight:500; }
    .nav-links a.active,.nav-links a:hover { color:var(--primary); }
    .hero { background:linear-gradient(135deg,#4F46E5,#7C3AED); color:#fff; text-align:center; padding:2.4rem 1rem; }
    .hero h1 { font-size:2rem; }
    .container { max-width:1100px; margin:0 auto; padding:2rem 1rem; }
    .podium { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1rem; }
    .podium-item { background:#fff; border-radius:14px; text-align:center; padding:1rem; box-shadow:0 6px 20px rgba(0,0,0,.06); }
    .podium-item.first { border:2px solid #F59E0B; }
    .avatar { width:52px; height:52px; border-radius:50%; margin:.5rem auto; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; }
    .my-rank { background:#fff; border-radius:12px; padding:1rem; display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
    .list { background:#fff; border-radius:14px; overflow:hidden; }
    .item { padding:1rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #F3F4F6; }
    .item:last-child{border-bottom:none;}
    .left { display:flex; gap:.8rem; align-items:center; }
    .rank { width:34px; text-align:center; font-weight:700; color:#6B7280; }
    .name { font-weight:600; }
    .exp { color:#F59E0B; font-weight:700; }
    .badge { margin-left:.4rem; padding:.12rem .45rem; border-radius:999px; background:#EEF2FF; color:#4338CA; font-size:.72rem; }
    @media (max-width:768px){ .nav-links{display:none;} .podium{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<header><div class="header-inner"><a th:href="@{/}" href="/" class="logo"><i class="fa-solid fa-layer-group"></i> FlashLearn</a><div class="nav-links"><a th:href="@{/library}" href="/library">Thu vien</a><a th:href="@{/mydeck}" href="/mydeck">Cua toi</a><a th:href="@{/leaderboard}" href="/leaderboard" class="active">Xep hang</a><a th:href="@{/profile}" href="/profile">Ho so</a></div></div></header>
<section class="hero"><h1><i class="fa-solid fa-ranking-star"></i> Bang xep hang</h1></section>
<div class="container">
  <div class="podium" id="podium"></div>
  <div class="my-rank"><div><strong>Thu hang cua ban</strong><div style="font-size:.85rem;color:#6B7280;" id="myName">--</div></div><div id="myRank">#--</div></div>
  <div class="list" id="leaderboardList"></div>
</div>
<script src="/js/auth.js"></script>
<script>
const API_BASE = '/api';

function getInitials(name) {
  return (name || 'U').split(' ').map(v => v[0]).join('').substring(0, 2).toUpperCase();
}

function colors(i) {
  const arr = ['#F59E0B','#3B82F6','#10B981','#8B5CF6','#EC4899','#14B8A6','#F97316','#6366F1','#EF4444','#84CC16'];
  return arr[i % arr.length];
}

function renderPodium(data) {
  const top = data.slice(0,3);
  const order = [1,0,2].filter(idx => top[idx]);
  document.getElementById('podium').innerHTML = order.map(idx => {
    const item = top[idx];
    return `<div class="podium-item ${item.rank === 1 ? 'first' : ''}"><div style="font-weight:700;">#${item.rank}</div><div class="avatar" style="background:${colors(item.rank - 1)}">${getInitials(item.fullname || item.username)}</div><div style="font-weight:700;">${item.fullname || item.username}</div><div style="color:#F59E0B;font-weight:700;">${(item.exp || 0).toLocaleString()} EXP</div></div>`;
  }).join('');
}

function renderList(data, meName) {
  document.getElementById('leaderboardList').innerHTML = data.map((item, i) => {
    const name = item.fullname || item.username || 'User';
    const isMe = meName && name === meName;
    return `<div class="item"><div class="left"><div class="rank">${item.rank || i + 1}</div><div class="avatar" style="background:${colors(i)}">${getInitials(name)}</div><div class="name">${name}${isMe ? '<span class="badge">Ban</span>' : ''}<div style="font-size:.8rem;color:#6B7280;">Level ${item.level || 1}</div></div></div><div class="exp">${(item.exp || 0).toLocaleString()} EXP</div></div>`;
  }).join('');
}

async function loadLeaderboard() {
  try {
    const token = localStorage.getItem('token');
    const res = await fetch(API_BASE + '/leaderboard', { headers: token ? { 'Authorization': 'Bearer ' + token } : {} });
    if (!res.ok) throw new Error();

    const data = await res.json();
    const me = JSON.parse(localStorage.getItem('user') || 'null');
    const meName = me ? (me.fullname || me.username) : '';

    renderPodium(data);
    renderList(data, meName);

    const idx = data.findIndex(item => (item.fullname || item.username) === meName);
    document.getElementById('myRank').textContent = idx >= 0 ? '#' + (idx + 1) : '#--';
    document.getElementById('myName').textContent = meName || 'Chua dang nhap';
  } catch {
    document.getElementById('leaderboardList').innerHTML = '<p style="padding:1rem;color:#EF4444;">Khong tai duoc bang xep hang.</p>';
  }
}

loadLeaderboard();
</script>
</body>
</html>
